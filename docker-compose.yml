services:
  postgres:
    image: postgres:16-alpine
    container_name: keystone-postgres
    environment:
      POSTGRES_DB: keystone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keystone"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - keystone-postgres-data:/var/lib/postgresql/data

volumes:
  keystone-postgres-data:
